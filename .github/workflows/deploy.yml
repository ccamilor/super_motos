name: Deploy Web App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable web support
        run: flutter config --enable-web

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web App
        run: flutter build web --release --no-tree-shake-icons --base-href "/super_motos/"

      - name: Deploy to web_deploy branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: web_deploy
          token: ${{ secrets.GITHUB_TOKEN }}
